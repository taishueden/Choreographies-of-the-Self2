<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>自己のコレオグラフィー</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        video,
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        video {
            display: none;
            transform: scaleX(-1);
        }

        canvas {
            z-index: 1;
            transform: scaleX(-1);
        }

        #startBtn {
            position: absolute;
            z-index: 20;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: #0078d4;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        #blackOverlay {
            position: absolute;
            inset: 0;
            background: black;
            z-index: 10;
            display: none;
        }
    </style>
</head>

<body>

<div id="wrapper">
    <button id="startBtn">こちらをクリック</button>

    <div id="blackOverlay"></div>

    <video
        id="video"
        autoplay
        muted
        playsinline
    ></video>

    <canvas id="canvas"></canvas>
</div>

<script>

const startBtn = document.getElementById("startBtn");
const overlay = document.getElementById("blackOverlay");

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");

const ctx = canvas.getContext("2d");

const delaySeconds = 1.5;

/*
    כמה פריימים לשנייה
    30 נותן תוצאה חלקה
*/
const fps = 30;

const frameBuffer = [];

let captureWidth = 0;
let captureHeight = 0;

/*
    בדיקת תמיכה
*/
if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    alert("הדפדפן לא תומך בגישה למצלמה");
}

/*
    התחלה
*/
startBtn.addEventListener("click", async () => {

    startBtn.style.display = "none";
    overlay.style.display = "block";

    try {

        /*
            בקשת מצלמה
        */
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: "user",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            },
            audio: false
        });

        video.srcObject = stream;

        /*
            ממתין שהוידאו ייטען
        */
        await video.play();

        captureWidth = video.videoWidth;
        captureHeight = video.videoHeight;

        canvas.width = captureWidth;
        canvas.height = captureHeight;

        /*
            כמה פריימים צריך לשמור
        */
        const delayFrames = Math.floor(delaySeconds * fps);

        overlay.style.display = "none";

        /*
            לולאת רינדור
        */
        function render() {

            /*
                שומר פריים חדש
            */
            const tempCanvas = document.createElement("canvas");
            tempCanvas.width = captureWidth;
            tempCanvas.height = captureHeight;

            const tempCtx = tempCanvas.getContext("2d");

            tempCtx.drawImage(
                video,
                0,
                0,
                captureWidth,
                captureHeight
            );

            frameBuffer.push(tempCanvas);

            /*
                שומר גודל buffer קבוע
            */
            if (frameBuffer.length > delayFrames) {

                const delayedFrame = frameBuffer.shift();

                ctx.drawImage(
                    delayedFrame,
                    0,
                    0,
                    captureWidth,
                    captureHeight
                );
            }

            requestAnimationFrame(render);
        }

        render();

    } catch (err) {

        console.error(err);

        alert("יש לאשר גישה למצלמה כדי להפעיל את האפקט.");

        startBtn.style.display = "block";
        overlay.style.display = "none";
    }
});

</script>

</body>
</html>
