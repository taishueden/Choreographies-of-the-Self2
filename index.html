<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מצלמה בדיליי</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        button { padding: 18px 40px; font-size: 22px; font-weight: bold; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 50px; z-index: 20; box-shadow: 0 4px 20px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; }
        #blackOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="wrapper">
        <button id="startBtn">לחץ להפעלה</button>
        <div id="blackOverlay"></div>
        <video id="delayedVideo" autoplay playsinline muted></video>
    </div>

    <script>
        const btn = document.getElementById('startBtn');
        const overlay = document.getElementById('blackOverlay');
        const video = document.getElementById('delayedVideo');
        const delaySeconds = 1.5;

        btn.onclick = async () => {
            btn.style.display = 'none';
            overlay.style.display = 'block';
            
            try {
                // מותאם למובייל - מבקש את המצלמה הקדמית כברירת מחדל
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                const mimeType = 'video/webm; codecs="vp8"';
                const mediaRecorder = new MediaRecorder(stream, { mimeType });
                const sourceBuffer = new MediaSource();
                video.src = URL.createObjectURL(sourceBuffer);

                sourceBuffer.addEventListener('sourceopen', () => {
                    const sb = sourceBuffer.addSourceBuffer(mimeType);
                    
                    mediaRecorder.ondataavailable = (e) => {
                        if (e.data.size > 0 && sourceBuffer.readyState === 'open') {
                            const reader = new FileReader();
                            reader.onload = () => {
                                if (!sb.updating) sb.appendBuffer(new Uint8Array(reader.result));
                            };
                            reader.readAsArrayBuffer(e.data);
                        }
                    };

                    mediaRecorder.start(100);

                    setTimeout(() => {
                        overlay.style.display = 'none';
                        video.style.display = 'block';
                        video.currentTime = 0;
                        video.play();

                        setInterval(() => {
                            if (video.paused || sb.buffered.length === 0) return;
                            const bufferEnd = sb.buffered.end(sb.buffered.length - 1);
                            const currentPos = video.currentTime;
                            if (bufferEnd - currentPos < (delaySeconds - 0.1)) {
                                video.currentTime = bufferEnd - delaySeconds;
                            }
                        }, 200); 
                    }, delaySeconds * 1000);
                });

            } catch (err) {
                alert("כדי שהאפקט יעבוד, יש לאשר גישה למצלמה בדפדפן.");
                btn.style.display = 'block';
                overlay.style.display = 'none';
            }
        };
    </script>
</body>
</html>
